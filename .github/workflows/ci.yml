name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    env:
      MYSQL_ROOT_PASSWORD: ci-root-password
      DB_URL: jdbc:mysql://localhost:3306/banco_ci?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: ci-db-password
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      JWT_SECRET_KEY: ci-jwt-secret-minimum-32-characters
      ISSUER_GENERATOR: banco-service-ci
      JASYPT_ENCRYPTOR_PASSWORD: ci-jasypt-password
      MAIL_ENABLED: "false"
      MAIL_HOST: localhost
      MAIL_PORT: "2525"
      MAIL_USERNAME: ci-mail-user
      MAIL_PASSWORD: ci-mail-password
      MAIL_FROM: no-reply@example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect backend changes (PR only)
        id: changes
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"
          if git diff --quiet "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" -- banco-service/; then
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "24"
          cache: maven
          cache-dependency-path: banco-service/pom.xml

      - name: Run full test suite (push)
        if: github.event_name == 'push'
        working-directory: banco-service
        run: mvn -B -ntp test

      - name: Run focused controller/security smoke suite (PR backend changes)
        # Smoke suite for fast feedback in PRs; full suite runs on push.
        if: github.event_name == 'pull_request' && steps.changes.outputs.run_tests == 'true'
        working-directory: banco-service
        run: >
          mvn -B -ntp
          -Dtest=ControllerSecurityAnnotationsTest,AccountControllerSecuritySliceWebMvcTest,CardControllerSecuritySliceWebMvcTest,EnvelopeControllerSecuritySliceWebMvcTest
          test

      - name: Run integration test suite (PR backend changes)
        # Covers Testcontainers DB tests and EmbeddedKafka consumer tests — previously only ran on push.
        if: github.event_name == 'pull_request' && steps.changes.outputs.run_tests == 'true'
        working-directory: banco-service
        run: >
          mvn -B -ntp
          -Dtest=UserCredentialRepositoryIntegrationTest,RefreshTokenRepositoryIntegrationTest,FraudDetectionConsumerIntegrationTest,NotificationConsumerIntegrationTest,RiskProfileConsumerDltIntegrationTest
          test

      - name: Skip tests (no backend changes in PR)
        if: github.event_name == 'pull_request' && steps.changes.outputs.run_tests != 'true'
        run: echo "No backend changes detected; skipping Maven tests for this PR."
