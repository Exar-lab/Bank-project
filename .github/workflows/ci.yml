name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect backend changes (PR only)
        id: changes
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"
          if git diff --quiet "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" -- banco-service/; then
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: banco-service/pom.xml

      - name: Run tests
        if: github.event_name == 'push' || steps.changes.outputs.run_tests == 'true'
        working-directory: banco-service
        run: mvn -B -ntp test

      - name: Run focused controller/security suites
        if: github.event_name == 'push' || steps.changes.outputs.run_tests == 'true'
        working-directory: banco-service
        run: >
          mvn -B -ntp
          -Dtest=ControllerSecurityAnnotationsTest,RolePermissionMatrixCardTest,AccountControllerSecuritySliceWebMvcTest,CardControllerSecuritySliceWebMvcTest,EnvelopeControllerSecuritySliceWebMvcTest
          test

      - name: Skip tests (no backend changes in PR)
        if: github.event_name == 'pull_request' && steps.changes.outputs.run_tests != 'true'
        run: echo "No backend changes detected; skipping Maven tests for this PR."
