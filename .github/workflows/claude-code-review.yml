name: Claude Code Review

# Runs automatically on every PR opened or updated.
# Only trusted collaborators (OWNER/MEMBER/COLLABORATOR) can open PRs that trigger this workflow.
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths-ignore:
      - ".github/workflows/claude-code-review.yml"
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    if: |
      github.event.pull_request.author_association == 'OWNER' ||
      github.event.pull_request.author_association == 'MEMBER' ||
      github.event.pull_request.author_association == 'COLLABORATOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    env:
      CLAUDE_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Skip when OAuth token is unavailable
        if: ${{ env.CLAUDE_TOKEN == '' }}
        run: echo "CLAUDE_CODE_OAUTH_TOKEN is not configured; skipping Claude review."

      - name: Run Claude Code Review
        id: claude-review
        if: ${{ env.CLAUDE_TOKEN != '' }}
        uses: anthropics/claude-code-action@3ac52d0da9f8ec9ca7b4dc23bb477e36ef9c77a9 # v1 — pinned SHA for supply-chain security
        with:
          claude_code_oauth_token: ${{ env.CLAUDE_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
