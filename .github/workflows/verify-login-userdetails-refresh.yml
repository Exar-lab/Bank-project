name: Verify login-userdetails-refresh (manual)

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: 'Branch or tag containing login-userdetails-refresh tests'
        required: true

permissions:
  contents: read

jobs:
  verify-login-userdetails-refresh:
    name: verify-login-userdetails-refresh
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '24'
          cache: maven
          cache-dependency-path: banco-service/pom.xml

      - name: Run focused auth/userdetails/refresh verification suite
        working-directory: banco-service
        run: |
          tests=(
            "AuthServiceTest"
            "CustomUserDetailsServiceTest"
            "AuthControllerWebMvcTest"
            "UserCredentialRepositoryIntegrationTest"
            "RefreshTokenRepositoryIntegrationTest"
          )

          for test_class in "${tests[@]}"; do
            echo "Running $test_class"
            mvn -B -ntp -Dtest="$test_class" test
          done
