name: Verify login-userdetails-refresh (manual)

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: 'Branch or tag containing login-userdetails-refresh tests'
        required: false
        default: 'master'

permissions:
  contents: read

jobs:
  verify-login-userdetails-refresh:
    name: verify-login-userdetails-refresh
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: banco-service/pom.xml

      - name: Run focused auth/userdetails/refresh verification suite
        working-directory: banco-service
        run: >
          mvn -B -ntp
          -Dtest=AuthServiceTest,CustomUserDetailsServiceTest,AuthControllerWebMvcTest,UserCredentialRepositoryIntegrationTest,RefreshTokenRepositoryIntegrationTest
          test
