spring:
  application:
    name: banco-service
  datasource:
    url: ${DB_URL}
    password: ${DB_PASSWORD}
    username: ${DB_USERNAME}
  jpa:
    hibernate:
      ddl-auto: update

# =============================================
# Kafka
# =============================================
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        max.in.flight.requests.per.connection: 1
        enable.idempotence: true
    consumer:
      group-id: banco-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false

# =============================================
# Flyway
# =============================================
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    baseline-version: 0

# =============================================
# Scheduling
# =============================================
  task:
    scheduling:
      enabled: true

# =============================================
# Dotenv (Opción C: .env compartido con Docker Compose)
# =============================================
springdotenv:
  directory: ${SPRINGDOTENV_DIRECTORY:..}

# =============================================
# Jasypt - Encriptación
# =============================================
jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD}
    algorithm: PBEWithMD5AndDES
    iv-generator-classname: org.jasypt.iv.NoIvGenerator

security:
  jwt:
    secret-key: ${JWT_SECRET_KEY}
    issuer: ${ISSUER_GENERATOR}
    access-token:
      expiration-minutes: 15  # Access token corto
    refresh-token:
      expiration-days: 30     # Refresh token largo

# =============================================
# Fraud Detection
# =============================================
fraud:
  detection:
    risk-profile-enabled: false
    suspicious-threshold: 10000000
    blocked-threshold: 50000000
    risk-profile-query-timeout-ms: 25
    risk-profile-fallback-policy: FAIL_OPEN_LEGACY_THRESHOLD
    risk-profile-async:
      consumer-name: risk-profile-consumer
      medium-threshold: 10000000
      high-threshold: 50000000
      restricted-threshold: 100000000
      low-score: 25.00
      medium-score: 60.00
      high-score: 85.00
      restricted-score: 95.00
      rule-set-version: v1
