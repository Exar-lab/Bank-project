<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operación completada</title>
</head>
<body>
<h1><span th:text="${operationLabel}">Operación</span> completada</h1>
<p>Hola <span th:text="${recipientName}">Usuario</span>,</p>
<p>
    Tu <span th:text="${operationLabel}">operación</span> de
    <strong th:text="${amount}">0</strong> <span th:text="${currency}">CRC</span>
    en la cuenta <strong th:text="${accountCode}">ACC-000</strong> fue procesada exitosamente.
</p>
<p>Código de transacción: <strong th:text="${transactionCode}">TXN-000</strong></p>
<p>Fecha: <span th:text="${occurredAt}">2026-01-01</span></p>
<p>Seguimos acompañándote en <span th:text="${bankName}">Banco CO</span>.</p>
</body>
</html>
